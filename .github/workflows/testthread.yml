name: TestThread

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run TestThread Suite
        if: ${{ secrets.TESTTHREAD_SUITE_ID != '' }}
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://test-thread-production.up.railway.app/trigger?suite_id=${{ secrets.TESTTHREAD_SUITE_ID }}" \
            -H "Content-Type: application/json")
          
          PASSED=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('passed', 0))")
          FAILED=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed', 0))")
          
          if [ "$FAILED" -gt "0" ]; then
            echo "TestThread: $FAILED test(s) failed."
            exit 1
          fi
          
          echo "TestThread: All $PASSED tests passed."

      - name: Skip TestThread
        if: ${{ secrets.TESTTHREAD_SUITE_ID == '' }}
        run: echo "TestThread: No suite ID configured. Add TESTTHREAD_SUITE_ID to secrets to enable."